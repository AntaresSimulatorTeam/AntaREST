version: '2.1'
services:
  antares-antarest:
    image: antarest:latest
    container_name : antarest
    environment :
      - UVICORN_ROOT_PATH=/api
    depends_on:
      - redis
      - postgresql
    volumes:
      - ./resources/deploy/examples:/workspaces
      - ./resources/deploy/tmp:/antarest_tmp_dir
      - ./resources/deploy/matrices:/matrixstore
      - ./resources/deploy/config.prod.yaml:/resources/application.yaml
      - ./resources/deploy/logs:/logs
      - ./resources/deploy/gunicorn.py:/conf/gunicorn.py
      - ./antares-8.8.17-Ubuntu-22.04/bin:/antares_simulator
  antares-antarest-watcher:
    image: antarest:latest
    container_name: antarest-watcher
    volumes:
      - ./resources/deploy/examples:/workspaces
      - ./resources/deploy/tmp:/antarest_tmp_dir
      - ./resources/deploy/matrices:/matrixstore
      - ./resources/deploy/config.prod.yaml:/resources/application.yaml
      - ./resources/deploy/logs:/logs
    depends_on:
      - antares-antarest
    command: watcher
  antares-antarest-matrix-gc:
    image: antarest:latest
    container_name : antarest-matrix-gc
    volumes:
      - ./resources/deploy/examples:/workspaces
      - ./resources/deploy/tmp:/antarest_tmp_dir
      - ./resources/deploy/matrices:/matrixstore
      - ./resources/deploy/config.prod.yaml:/resources/application.yaml
      - ./resources/deploy/logs:/logs
    depends_on:
      - antares-antarest
    command: matrix_gc
  antarest-maintenance-beat:
    image: antarest:latest
    container_name: antarest-maintenance-beat
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CELERY_TIMEZONE=UTC
    volumes:
      - ./resources/deploy/config.prod.yaml:/resources/application.yaml
      - ./resources/deploy/logs:/logs
    depends_on:
      - redis
      - postgresql
    command: celery-beat
    healthcheck:
      test: ["CMD-SHELL", "celery -A antarest.celery.app:celery_app inspect scheduled -t 3 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
  antarest-maintenance-worker:
    image: antarest:latest
    container_name: antarest-maintenance-worker
    environment:
      - ANTAREST_CONFIG=/resources/application.yaml
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CELERY_CONCURRENCY=1
      - CELERY_POOL=solo
    volumes:
      - ./resources/deploy/examples:/workspaces
      - ./resources/deploy/tmp:/antarest_tmp_dir
      - ./resources/deploy/matrices:/matrixstore
      - ./resources/deploy/blobstore:/blobstore
      - ./resources/deploy/archives:/archives
      - ./resources/deploy/config.prod.yaml:/resources/application.yaml
      - ./resources/deploy/logs:/logs
    depends_on:
      - redis
      - postgresql
      - antarest-maintenance-beat
    command: celery-worker
    healthcheck:
      test: ["CMD-SHELL", "celery -A antarest.celery.app:celery_app inspect ping -d celery@$HOSTNAME -t 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: celery-exporter
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
    ports:
      - "9808:9808"
    depends_on:
      - redis
    restart: unless-stopped
  postgresql:
    image: postgres:latest
    container_name: postgres
    environment:
      - POSTGRES_PASSWORD=somepass
      - PG_DATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./resources/deploy/db:/var/lib/postgresql/data
    command: [ "postgres", "-c", "log_statement=all", "-c", "log_destination=stderr" ]
  redis:
    image: redis:latest
    container_name : redis
  nginx:
    image: nginx:latest
    container_name: nginx
    depends_on:
      - antares-antarest
    ports:
      - 80:80
    volumes:
      - ./resources/deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./webapp/dist:/www
      - ./resources/deploy/web.config.json:/www/config.json:ro
