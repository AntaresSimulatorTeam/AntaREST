name: main
on:
  push:
    branches:
      - "**"

jobs:
  python-lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout github repo (+ download lfs dependencies)
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --frozen --extra desktop --compile-bytecode
      - name: Check format (ruff)
        run: |
          uv run --frozen ruff check antarest/ tests/
          uv run --frozen ruff format --check antarest/ tests/
      - name: Check Typing (mypy)
        run: uv run --frozen mypy --install-types --non-interactive

  python-test:
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 9
      matrix:
        os: [windows-latest, ubuntu-22.04]
        python-version: [3.11, 3.14]

    steps:
      - name: Checkout github repo (+ download lfs dependencies)
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: matrix.python-version
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --frozen --compile-bytecode
      - name: Test with pytest
        run: uv run --frozen pytest --cov antarest --cov-report xml -n 4 --dist=worksteal
      - name: Archive code coverage results
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v7
        with:
          name: python-code-coverage-report
          path: coverage.xml

  npm-setup:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout github repo
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: webapp/node_modules
          key: ${{ runner.os }}-webapp-node-modules-${{ hashFiles('webapp/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-webapp-node-modules-
            ${{ runner.os }}-
          save-always: true
      - name: Install dependencies
        run: npm install
        working-directory: webapp

  npm-lint:
    needs: npm-setup
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout github repo
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
      - name: Restore node modules
        uses: actions/cache@v5
        with:
          path: webapp/node_modules
          key: ${{ runner.os }}-webapp-node-modules-${{ hashFiles('webapp/package-lock.json') }}
          save-always: true
      - name: Lint
        run: npm run lint
        working-directory: webapp

  npm-test:
    needs: npm-setup
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout github repo
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
      - name: Restore node modules
        uses: actions/cache@v5
        with:
          path: webapp/node_modules
          key: ${{ runner.os }}-webapp-node-modules-${{ hashFiles('webapp/package-lock.json') }}
          save-always: true
      - name: Test
        run: npm run test
        working-directory: webapp

  npm-build:
    needs: npm-setup
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout github repo
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
      - name: Restore node modules
        uses: actions/cache@v5
        with:
          path: webapp/node_modules
          key: ${{ runner.os }}-webapp-node-modules-${{ hashFiles('webapp/package-lock.json') }}
          save-always: true
      - name: Build
        run: npm run build
        working-directory: webapp
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          DISABLE_ESLINT_PLUGIN: true

  sonarcloud:
    runs-on: ubuntu-22.04
    needs: [python-test, npm-test]
    steps:
      - uses: actions/checkout@v6
      - name: Download python coverage report
        uses: actions/download-artifact@v7
        with:
          name: python-code-coverage-report
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
