name: worker
on:
  push:
    branches:
      - "master"
      - "worker/**"

jobs:
  binary:
    runs-on: windows-latest

    steps:
      - name: 🐙 Checkout GitHub repo (+ download lfs dependencies)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.14

      - name: 🔧 Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: 🐍 Install dependencies
        run: uv sync --frozen --extra desktop --extra windows --compile-bytecode

      - name: 📦 Packaging AntaresWebWorker
        run: bash ./package_worker.sh
        working-directory: scripts

      - name: 🚀 Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: AntaresWebWorker
          path: dist/AntaresWebWorker.exe
