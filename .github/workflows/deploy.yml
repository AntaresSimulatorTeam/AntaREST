name: deploy
on:
  push:
    branches:
      - "master"
      - "hotfix/**"

jobs:
  binary:
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 3
      matrix:
        os: [ windows-latest, ubuntu-22.04]

    steps:
      - name: 🐙 Checkout GitHub repo (+ download lfs dependencies)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: 🔗 Install wget for Windows
        if: matrix.os == 'windows-latest'
        run: choco install wget --no-progress

      - name: 💚 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: 💚 Install dependencies
        run: npm install
        working-directory: webapp

      - name: 💚 Build webapp
        run: bash ./build-front.sh
        working-directory: scripts
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: 🔧 Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: 🐍 Install dependencies
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            # On Windows, skip desktop extra due to PyQt5-Qt5 wheel availability issues
            uv sync --extra test --extra windows
            # Install PyQt5 separately via pip (it manages its own Qt binaries)
            uv pip install PyQt5~=5.15.6
          else
            uv sync --all-extras
          fi

      - name: 📦 Packaging
        run: bash ./package_antares_web.sh
        working-directory: scripts

      - name: Add installer to package
        shell: bash
        run: |
          uv tool install hatch
          ./package_antares_installer.sh
        working-directory: scripts

      - name: 📜️ Copy changelog file
        run: |
          cp docs/CHANGELOG.md dist/package/CHANGELOG.md

      - name: 📦 Archive Antares Desktop for Windows
        if: matrix.os == 'windows-latest'
        run: 7z a AntaresWeb.zip *
        working-directory: dist/package

      - name: 📦 Archive Antares Desktop for Ubuntu
        # this is the only way to preserve file permission and symlinks
        if: matrix.os != 'windows-latest'
        run: zip -r --symlinks AntaresWeb.zip *
        working-directory: dist/package

      - name: 🚀 Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: AntaresWeb-${{ matrix.os }}-pkg
          path: dist/package/AntaresWeb.zip
